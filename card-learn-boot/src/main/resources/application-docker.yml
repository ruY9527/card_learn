server:
  port: 8080

spring:
  application:
    name: card-learn-boot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/card_learn?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:123456}
  redis:
    host: redis
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 10000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.card.learn.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: '2'
      logic-not-delete-value: '0'

# JWT配置
jwt:
  secret: card-learn-jwt-secret-key-2024
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN