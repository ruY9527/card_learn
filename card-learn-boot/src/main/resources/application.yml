server:
  port: 8080

spring:
  profiles:
    active: local  # 本地开发激活local profile（含SMTP真实配置），部署时改为prod或去掉
  application:
    name: card-learn-boot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/card_learn?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password: 123
    database: 0
    timeout: 10000ms
  # Jackson 日期格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  # 邮件配置（请替换为实际SMTP信息）
  mail:
    host: smtp.example.com
    port: 587
    username: noreply@example.com
    password: xxxxxx
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # 解决Swagger/Knife4j与Spring Boot 2.6+兼容性问题
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.card.learn.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: '2'
      logic-not-delete-value: '0'

# JWT配置
jwt:
  secret: card-learn-jwt-secret-key-20240101
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# 邮箱认证配置
email:
  from: noreply@example.com
  verify-code-ttl: 300
  activate-code-ttl: 86400
  send-limit-per-day: 10
  send-interval-seconds: 60
  activate-base-url: http://localhost:5173/auth/activate

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN